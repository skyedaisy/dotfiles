# Fonts
font_family      Maple Mono NF CN Regular
bold_font        Maple Mono NF CN Bold
italic_font      Maple Mono NF CN Italic
bold_italic_font Maple Mono NF CN BoldItalic
font_size 14.0

# Terminal configs
include kitty-colors.conf
# Terminal window layout
# remember_window_size yes
initial_window_width 600
initial_window_height 400
background_opacity 0.9
term xterm-256color
enable_audio_bell no
# window_padding_width 10
confirm_os_window_close 0
strip_trailing_spaces smart
selection_foreground none
selection_background none

# Cursor
#cursor_shape beam
#cursor_trail 1

# Hotkeys
map ctrl+c    copy_or_interrupt
map ctrl+plus  change_font_size all +1
map ctrl+equal  change_font_size all +1
map ctrl+kp_add  change_font_size all +1
map ctrl+minus       change_font_size all -1
map ctrl+underscore       change_font_size all -1
map ctrl+kp_subtract       change_font_size all -1
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0
map super+shift+enter       new_os_window_with_cwd

# Undercurl
undercurl_style thin-dense
url_style curly
show_hyperlink_targets yes


# change to x11 or wayland or leave auto
linux_display_server auto
