# Fonts
font_family      Maple Mono NF Regular
bold_font        Maple Mono NF Bold
italic_font      Maple Mono NF Italic
bold_italic_font Maple Mono NF BoldItalic
font_size 14.0

# Terminal configs
include kitty-colors.conf
# Terminal window layout
# remember_window_size yes
initial_window_width 600
initial_window_height 400
background_opacity 0.7
term xterm-256color
enable_audio_bell no
# window_padding_width 10
confirm_os_window_close 0
copy_on_select clipboard
strip_trailing_spaces smart
selection_foreground none
selection_background none

# Undercurl
undercurl_style thin-dense
url_style curly
show_hyperlink_targets yes


# change to x11 or wayland or leave auto
linux_display_server auto

map super+shift+enter       new_os_window_with_cwd
